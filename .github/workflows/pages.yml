name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Prepare static site
        run: |
          mkdir -p public-deploy/scenarios
          cp -r public/* public-deploy/
          if [ -d resources/scenarios ]; then
            cp -r resources/scenarios/* public-deploy/scenarios/ 2>/dev/null || true
          fi
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public-deploy
      - uses: actions/deploy-pages@v4
        id: deployment
