<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Бункер — Профиль</title>
  <script>
    (function(){var p=location.pathname.replace(/\\/g,"/");var r=/^\/user\/[^/]+\/?$/i.test(p)||/^\/(?:account|auth|news|friends|host|player|profile|game\/[^/]+)\/?$/i.test(p);if(r&&!document.querySelector("base[data-bunker-root]")){var b=document.createElement("base");b.href="/";b.setAttribute("data-bunker-root","1");document.head.appendChild(b);}})();
  </script>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="account profile-page">
  <div class="page page--with-topbar">
    <div data-site-topbar class="site-topbar"></div>
    <a href="/" class="back-link">← На главную</a>

    <header class="site-header site-header--profile">
      <div class="site-header__badge">Досье выжившего</div>
      <h1 id="profilePageTitle" class="visually-hidden">Профиль</h1>
      <p class="site-header__tagline visually-hidden" id="profilePageTagline">Загрузка…</p>
    </header>

    <section id="profilePageContent" class="panel profile-page-panel">
      <p>Загрузка профиля…</p>
    </section>
  </div>

  <script src="/config.js"></script>
  <script src="/bunker-runtime.js"></script>
  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js" crossorigin="anonymous"></script>
  <script src="/auth.js"></script>
  <script src="/user-badges.js"></script>
  <script src="/social-client.js"></script>
  <script src="/notifications.js"></script>
  <script src="/premium-modal.js"></script>
  <script src="/site-auth.js"></script>
  <script src="/dev-panel.js"></script>
  <script src="/chat-attachments.js"></script>
  <script src="/chat-widget.js"></script>
  <script src="/avatar-crop.js"></script>
  <script src="/scenario-catalog-ui.js"></script>
  <script src="/profile.js"></script>
</body>
</html>
