<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Бункер — Авторизация</title>
  <script>
    (function(){var p=location.pathname.replace(/\\/g,"/");var r=/^\/user\/[^/]+\/?$/i.test(p)||/^\/(?:account|auth|news|friends|host|player|profile|game\/[^/]+)\/?$/i.test(p);if(r&&!document.querySelector("base[data-bunker-root]")){var b=document.createElement("base");b.href="/";b.setAttribute("data-bunker-root","1");document.head.appendChild(b);}})();
  </script>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="account">
  <div class="page page--with-topbar">
    <div data-site-topbar class="site-topbar"></div>
    <a href="/" class="back-link">← На главную</a>

    <header class="site-header">
      <div class="site-header__badge">Реестр выживших</div>
      <h1>Авторизация</h1>
      <p class="site-header__tagline" id="accountTagline">Регистрация, вход и восстановление доступа.</p>
    </header>

    <section id="authSection" class="panel">
      <div class="auth-tabs" role="tablist">
        <button type="button" class="auth-tabs__btn auth-tabs__btn--active" data-tab="login">Вход</button>
        <button type="button" class="auth-tabs__btn" data-tab="register">Регистрация</button>
        <button type="button" class="auth-tabs__btn" data-tab="reset">Сброс пароля</button>
      </div>

      <form id="loginForm" class="auth-form">
        <label class="field">
          <span class="field__label">Никнейм</span>
          <input type="text" id="loginNickname" maxlength="20" required autocomplete="username">
        </label>
        <label class="field">
          <span class="field__label">Пароль</span>
          <input type="password" id="loginPassword" required autocomplete="current-password">
        </label>
        <div class="cf-turnstile" id="loginCaptcha"></div>
        <p id="loginError" class="form-error hidden"></p>
        <button type="submit" class="btn btn--amber">Войти</button>
      </form>

      <form id="registerForm" class="auth-form hidden">
        <label class="field">
          <span class="field__label">Никнейм</span>
          <input type="text" id="regNickname" maxlength="20" required autocomplete="username">
          <span class="field__hint">3–20 символов: буквы, цифры, _ и -</span>
        </label>
        <label class="field">
          <span class="field__label">Email</span>
          <input type="email" id="regEmail" required autocomplete="email" placeholder="name@example.com">
        </label>
        <div class="auth-inline-row">
          <label class="field auth-inline-row__field">
            <span class="field__label">Код подтверждения</span>
            <input type="text" id="regCode" maxlength="8" required inputmode="numeric" autocomplete="one-time-code">
          </label>
          <button type="button" id="sendRegCodeBtn" class="btn btn--small">Отправить код</button>
        </div>
        <label class="field">
          <span class="field__label">Пароль</span>
          <input type="password" id="regPassword" minlength="6" required autocomplete="new-password">
        </label>
        <label class="field">
          <span class="field__label">Повтор пароля</span>
          <input type="password" id="regPassword2" minlength="6" required autocomplete="new-password">
        </label>
        <div class="cf-turnstile" id="registerCaptcha"></div>
        <p id="registerError" class="form-error hidden"></p>
        <p id="registerSuccess" class="form-success hidden"></p>
        <button type="submit" class="btn btn--amber">Создать аккаунт</button>
      </form>

      <form id="resetForm" class="auth-form hidden">
        <label class="field">
          <span class="field__label">Email</span>
          <input type="email" id="resetEmail" required autocomplete="email" placeholder="name@example.com">
        </label>
        <div class="auth-inline-row">
          <label class="field auth-inline-row__field">
            <span class="field__label">Код из письма</span>
            <input type="text" id="resetCode" maxlength="8" required inputmode="numeric" autocomplete="one-time-code">
          </label>
          <button type="button" id="sendResetCodeBtn" class="btn btn--small">Получить код</button>
        </div>
        <label class="field">
          <span class="field__label">Новый пароль</span>
          <input type="password" id="resetPassword" minlength="6" required autocomplete="new-password">
        </label>
        <div class="cf-turnstile" id="resetCaptcha"></div>
        <p id="resetError" class="form-error hidden"></p>
        <p id="resetSuccess" class="form-success hidden"></p>
        <button type="submit" class="btn btn--amber">Сбросить пароль</button>
      </form>
    </section>
  </div>

  <script src="/config.js"></script>
  <script src="/bunker-runtime.js"></script>
  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js" crossorigin="anonymous"></script>
  <script src="/auth.js"></script>
  <script src="/user-badges.js"></script>
  <script src="/social-client.js"></script>
  <script src="/notifications.js"></script>
  <script src="/premium-modal.js"></script>
  <script src="/site-auth.js"></script>
  <script src="/dev-panel.js"></script>
  <script src="/chat-widget.js"></script>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>
  <script src="/auth-page.js"></script>
</body>
</html>
